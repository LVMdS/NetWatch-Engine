services:
  # 1. Banco de Dados
  postgres:
    image: postgres:16-alpine
    container_name: netwatch_db
    environment:
      POSTGRES_USER: netwatch_user
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: netwatch
    ports:
      - "5432:5432"
    volumes:
      - netwatch_pgdata:/var/lib/postgresql/data
    networks:
      - netwatch_net
    restart: unless-stopped

  # 2. Aplicação Backend Go + Frontend
  netwatch_app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: netwatch_go
    depends_on:
      - postgres
    environment:
      - DB_HOST=netwatch_db # 👈 INJETAMOS A VARIÁVEL AQUI!
    networks:
      - netwatch_net
    restart: unless-stopped

  # 3. Proxy Reverso (Porta da Frente)
  nginx:
    image: nginx:alpine
    container_name: netwatch_proxy
    ports:
      - "80:80" # Única porta exposta para a sua rede local/internet!
    volumes:
      - ./configs/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - netwatch_app
    networks:
      - netwatch_net
    restart: unless-stopped

  # 4. Coletor de Métricas
  prometheus:
    image: prom/prometheus:latest
    container_name: netwatch_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - netwatch_net
    restart: unless-stopped

  # 5. Visualizador de Observabilidade
  grafana:
    image: grafana/grafana:latest
    container_name: netwatch_grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - netwatch_net
    restart: unless-stopped

volumes:
  netwatch_pgdata:

networks:
  netwatch_net:
    driver: bridge