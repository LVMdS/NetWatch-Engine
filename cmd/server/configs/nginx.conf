events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;

    # Define para onde o Nginx vai mandar as requisições
    upstream netwatch_backend {
        server netwatch_go:8080;
    }

    server {
        listen 80;
        server_name localhost;

        # 1. Roteamento padrão para APIs REST e Painel Estático
        location / {
            proxy_pass http://netwatch_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 2. CONFIGURAÇÃO CRÍTICA: Roteamento de WebSockets
        # Ensina o Nginx a manter o túnel TCP aberto e repassar os cabeçalhos de Upgrade
        location /ws {
            proxy_pass http://netwatch_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400; # Impede que o túnel caia por ociosidade
        }
    }
}